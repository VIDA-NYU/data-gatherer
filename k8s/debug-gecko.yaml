apiVersion: v1
kind: Pod
metadata:
  name: debug-gecko
  namespace: data-gatherer
spec:
  restartPolicy: Never
  containers:
  - name: debug
    image: pietromarini/data-gatherer-nvidia:20260430
    command: ["/bin/sh","-c","sleep 3600"]
    volumeMounts:
    - name: data
      mountPath: /data
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: data-gatherer-pvc
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: 2Gi
