apiVersion: batch/v1
kind: Job
metadata:
  name: data-gatherer-batch
  namespace: data-gatherer
spec:
  template:
    spec:
      containers:
      - name: data-gatherer
        image: pietromarini/data-gatherer-nvidia:20260501
        imagePullPolicy: Always
        command: ["python", "k8s/k8s_processor_base.py"]
        args:
          - "--input"
          - "/data/input/article_ids_eval.csv"
          - "--output-dir"
          - "/data/output"
          - "--model"
          - "hf-vida-nyu/flan-t5-base-dataref-info-extract"
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "16Gi"
            cpu: "4"
          requests:
            nvidia.com/gpu: "1"
            memory: "16Gi"
            cpu: "4"
        env:
        - name: MOZ_DISABLE_CONTENT_SANDBOX
          value: "1"
        envFrom:
        - secretRef:
            name: data-gatherer-env-secret
        volumeMounts:
        - name: data-pvc
          mountPath: /data
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: data-pvc
        persistentVolumeClaim:
          claimName: data-gatherer-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      restartPolicy: OnFailure
